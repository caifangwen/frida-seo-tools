    font-weight: 500;

    opacity: 0;

    font-weight: 700;

    margin: 40px 0 20px;

function renderComponents(filter = '') {
  const container = document.getElementById('components');
  container.innerHTML = '';
  
  components.forEach(cat => {
    const filteredItems = cat.items.filter(item => 
      item.name.toLowerCase().includes(filter.toLowerCase()) ||
      item.prefix.toLowerCase().includes(filter.toLowerCase())
    );
    
    if (filteredItems.length === 0) return;
    
    const categoryEl = document.createElement('div');
    categoryEl.className = 'category';
    categoryEl.textContent = cat.category;
    container.appendChild(categoryEl);
    
    const gridEl = document.createElement('div');
    gridEl.className = 'components-grid';
    
    filteredItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'component-card';
      card.innerHTML = `
        <div class="component-name">${item.name}</div>
        <span class="component-prefix">${item.prefix}</span>
        <div class="component-preview">${item.preview}</div>
        <div class="copy-hint">✅ 已复制!</div>
      `;
      card.addEventListener('click', () => copyToClipboard(item.html, card));
      gridEl.appendChild(card);
    });
    
    container.appendChild(gridEl);
  });
}

async function copyToClipboard(html, card) {
  try {
    await navigator.clipboard.writeText(html);
    card.classList.add('copied');
    showToast();
    setTimeout(() => card.classList.remove('copied'), 2000);
  } catch (err) {
    // Fallback for older browsers
    const textarea = document.createElement('textarea');
    textarea.value = html;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    card.classList.add('copied');
    showToast();
    setTimeout(() => card.classList.remove('copied'), 2000);
  }
}

function showToast() {
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

document.getElementById('search').addEventListener('input', (e) => {
  renderComponents(e.target.value);
});
